<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Life Line | Neural Core{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --danger: #ef4444;
            --bg-dark: #020617;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }

        /* Unique Animated Background: Moving Starfield */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }
        
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: moveStars 100s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 10000px 5000px; }
        }

        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg-dark);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4);
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 18px 32px;
            background: rgba(2, 6, 23, 0.92);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }

        .navbar h2 {
            margin: 10px;
            font-size: 1rem;
            letter-spacing: 1px;
            margin-left: 15px;
        }

        .navbar a {
    color: white;
    text-decoration: none;
    margin-right: 15px;
    font-size: 0.95rem;
    font-weight: 500;
    transition: color 0.3s ease, text-shadow 0.3s ease;
}

.navbar a:hover {
    color: #b21765;
    text-shadow: 0 0 10px rgba(178, 23, 101, 0.5);
}

.navbar a:last-child {
    margin-right: 45px;
}
        .container {
            padding: 120px 24px 48px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .dashboard-page {
            width: 100%;
            min-height: 100vh;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(180px, 1fr));
            gap: 20px;
        }

        .hud-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0,0,0,0.3);
            color: white;
        }

        .hud-table th,
        .hud-table td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .btn-dispatch {
            background: #10b981;
            border: none;
            color: white;
            font-size: 0.75rem;
            font-weight: 900;
            border-radius: 6px;
            cursor: pointer;
            padding: 8px 12px;
        }

        .map-link {
            background: rgba(0, 242, 255, 0.1);
            color: #00f2ff !important;
            padding: 6px 12px;
            border: 1px solid #00f2ff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;
        }

        .map-link:hover {
            background: #00f2ff;
            color: #000 !important;
            box-shadow: 0 0 10px #00f2ff;
        }

        @media (max-width: 1024px) {
            .navbar {
                padding: 18px 20px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .navbar div {
                width: 100%;
                display: flex;
                justify-content: center;
                gap: 20px;
            }

            .container {
                padding: 80px 16px 32px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, minmax(180px, 1fr)) !important;
            }

            .dashboard-page > div:first-child {
                padding: 0 !important;
            }

            .admin-card,
            .hud-table,
            .glass-card {
                width: 100% !important;
            }

            .hud-table th,
            .hud-table td {
                padding: 10px 8px;
            }
        }

        @media (max-width: 640px) {
            .navbar {
                padding: 14px 12px;
                flex-direction: column;
                align-items: stretch;
            }

            .navbar h2,
            .navbar div {
                width: 100%;
                text-align: center;
            }

            .stats-grid {
                grid-template-columns: 1fr !important;
            }

            .hud-table th,
            .hud-table td {
                font-size: 0.75rem;
            }

            .map-link {
                display: block;
                width: fit-content;
                margin-top: 8px;
            }

            .container {
                padding: 70px 12px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="stars"></div>
    </div>

    <!-- TOP NAV -->
    <div class="navbar">
        <h2>🩸 LifeLine Emergency System</h2>
        <div>
            <a href="/">Home</a>
            <a href="/logout">Logout</a>
        </div>

    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
